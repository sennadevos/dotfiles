[window]
padding = { x = 12, y = 8 }
opacity = 0.92
decorations = "None"

[font]
size = 12.0

[font.normal]
family = "Noto Sans Mono"
style = "Regular"

[font.bold]
style = "Bold"

[colors.primary]
background = "#161412"
foreground = "#c8beb5"

[colors.cursor]
cursor = "#e0a060"
text = "#161412"

[colors.selection]
background = "#3a3230"
text = "#c8beb5"

# Normal colors
[colors.normal]
black   = "#2a2624"
red     = "#c45c5c"
green   = "#a8b07a"
yellow  = "#e0a060"
blue    = "#7a9aaa"
magenta = "#b08a9a"
cyan    = "#88a888"
white   = "#c8beb5"

# Bright colors
[colors.bright]
black   = "#4a4540"
red     = "#d47070"
green   = "#b8c08a"
yellow  = "#e8b070"
blue    = "#8aaabc"
magenta = "#c09aaa"
cyan    = "#98b898"
white   = "#d8cec5"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[[keyboard.bindings]]
key = "W"
mods = "Control"
chars = "\u0017"
